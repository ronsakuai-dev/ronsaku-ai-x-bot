name: X Auto Post

on:
  # cron は一時停止中(2026-05-09〜): @ronsaku_ai がX側でbot判定状態のため、
  # 信用回復(人間活動)が確認できるまで手動実行のみ
  # schedule:
  #   - cron: '0,15,30,45 * * * *'
  workflow_dispatch: {}  # 手動実行のみ

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Decode auth & sheets credentials
        run: |
          echo "${{ secrets.X_AUTH_JSON_B64 }}" | base64 -d > .auth.json
          echo "${{ secrets.GOOGLE_SA_JSON_B64 }}" | base64 -d > .sa.json

      - name: Run post script
        run: npm run post
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ./.sa.json
          CI: "true"

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: /tmp/x-bot-*.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f .auth.json .sa.json
