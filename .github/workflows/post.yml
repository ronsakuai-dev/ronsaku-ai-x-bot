name: X Auto Post

on:
  schedule:
    # 15分ごとに実行 (朝7時/昼12時/夜19時の前後15分以内にカバー)
    - cron: '0,15,30,45 * * * *'
  workflow_dispatch: {}  # 手動実行も可能

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Decode auth & sheets credentials
        run: |
          echo "${{ secrets.X_AUTH_JSON_B64 }}" | base64 -d > .auth.json
          echo "${{ secrets.GOOGLE_SA_JSON_B64 }}" | base64 -d > .sa.json

      - name: Run post script
        run: npm run post
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ./.sa.json
          CI: "true"

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f .auth.json .sa.json
